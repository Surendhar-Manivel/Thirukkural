<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — திருக்குறள் | Thirukkural</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .search-hero { background: var(--header-bg-alpha); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); padding: 28px 0 0; }
    .search-hero .container { display: flex; flex-direction: column; gap: 14px; }
    .suggested-row { display:flex; align-items:center; gap:8px; padding:10px 0; border-top:1px solid rgba(180,134,11,0.15); }
    .suggested-lbl { font-size:11px; color:rgba(253,246,236,0.35); white-space:nowrap; }
    .sug-pill {
      font-size: 11px; padding: 4px 12px; border-radius: var(--radius-pill);
      border: 1px solid rgba(180,134,11,0.35); color: var(--color-gold);
      cursor: pointer; background: transparent; transition: all 0.15s;
      font-family: var(--font-ui);
    }
    .sug-pill:hover { background: rgba(180,134,11,0.15); color: #FAF0DC; }
    .sug-pill-ta { font-family: var(--font-tamil); }
    #search-count { font-size:13px; color:rgba(253,246,236,0.55); }
    #search-count strong { color: var(--color-gold); }
    .filter-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-pill {
      font-size: 12px; padding: 5px 14px; border-radius: var(--radius-pill);
      border: 1px solid var(--color-border-strong); color: var(--color-copper);
      cursor: pointer; background: transparent; transition: all 0.15s;
      font-family: var(--font-ui); font-weight: 500;
    }
    .filter-pill:hover { background: #FEF3DC; border-color: var(--color-gold); }
    .filter-pill.active { background: var(--color-gold); color: var(--color-ivory); border-color: var(--color-gold); }
    .result-meta { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
    .result-score { font-size:11px; color:var(--color-text-faint); margin-left:auto; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">
        <div class="navbar-logo-circle">த</div>
        <div>
          <div class="navbar-logo-text">திருக்குறள்</div>
          <div class="navbar-logo-sub">Thirukkural</div>
        </div>
      </a>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="browse.html">Browse</a></li>
        <li><a href="search.html" class="active">Search</a></li>
        <li><a href="thiruvalluvar.html">Thiruvalluvar</a></li>
      </ul>
    </div>
  </nav>

  <!-- SEARCH HERO -->
  <div class="search-hero">
    <div class="container">
      <div class="search-bar" style="max-width:600px">
        <input
          type="text"
          id="search-input"
          placeholder="Search in Tamil or English… e.g. அன்பு or virtue"
          autocomplete="off"
        />
        <button type="button" id="search-btn">Search</button>
      </div>

      <div id="search-count"></div>

      <div class="suggested-row">
        <span class="suggested-lbl">Try:</span>
        <button class="sug-pill sug-pill-ta" data-search="காதல்">காதல்</button>
        <button class="sug-pill sug-pill-ta" data-search="அன்பு">அன்பு</button>
        <button class="sug-pill sug-pill-ta" data-search="மழை">மழை</button>
        <button class="sug-pill" data-search="friendship">friendship</button>
        <button class="sug-pill" data-search="virtue">virtue</button>
        <button class="sug-pill" data-search="love">love</button>
        <button class="sug-pill" data-search="rain">rain</button>
        <button class="sug-pill" data-search="wisdom">wisdom</button>
      </div>
    </div>
    <div style="height:16px"></div>
  </div>

  <div class="temple-strip"></div>

  <!-- RESULTS -->
  <div class="container" style="padding-top:28px;padding-bottom:48px">

    <!-- Pal filter pills -->
    <div class="filter-pills">
      <button class="filter-pill active pal-filter" data-pal="all">All</button>
      <button class="filter-pill pal-filter" data-pal="Virtue">Virtue (அறம்)</button>
      <button class="filter-pill pal-filter" data-pal="Wealth">Wealth (பொருள்)</button>
      <button class="filter-pill pal-filter" data-pal="Love">Love (காமம்)</button>
    </div>

    <!-- Results container (rendered by main.js) -->
    <div id="kural-list">
      <div style="text-align:center;padding:48px;color:var(--color-text-faint)">
        Start typing to search all 1330 kurals in Tamil and English.
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div style="text-align:center;font-size:11px;color:rgba(253,246,236,0.35)">
        <span style="font-family:var(--font-tamil);color:var(--color-gold)">திருக்குறள்</span>
        &nbsp;·&nbsp; திருவள்ளுவர் இயற்றியது &nbsp;·&nbsp; Free for all
      </div>
    </div>
  </footer>

  <script src="data/kurals.js"></script>
  <script src="js/main.js"></script>
  <script>
    const SearchApp = {
      allResults: [],
      palFilter: "all",
      timeout: null,
      hasSearched: false,
      wordCache: null,

      triggerSearch() {
        const q = document.getElementById("search-input").value;
        this.runSearch(q);
      },

      setSearch(q) {
        document.getElementById("search-input").value = q;
        this.runSearch(q);
      },

      runSearch(q) {
        const url = new URL(window.location);
        if (q.trim()) {
          url.searchParams.set("q", q);
        } else {
          url.searchParams.delete("q");
        }
        window.history.replaceState({}, "", url);

        if (q.trim()) {
          this.hasSearched = true;
          const num = parseInt(q.trim(), 10);
          if (!isNaN(num) && String(num) === q.trim()) {
            const match = getKuralByNumber(num);
            this.allResults = match ? [match] : [];
          } else {
            this.allResults = searchKurals(q);
          }
        } else {
          this.hasSearched = false;
          this.allResults = [];
        }

        this.applyPalFilter(
          document.querySelector(`.filter-pill[data-pal="${this.palFilter}"]`),
          this.palFilter,
          q
        );
      },

      debouncedSearch(q) {
        clearTimeout(this.timeout);
        this.timeout = setTimeout(() => this.runSearch(q), 50);
      },

      applyPalFilter(btn, pal, query) {
        this.palFilter = pal;
        document.querySelectorAll(".filter-pill").forEach(b => b.classList.remove("active"));
        if (btn) btn.classList.add("active");

        const base = this.hasSearched ? this.allResults : KURALS;
        const filtered = pal === "all" ? base : base.filter(k => k.pal.en === pal);
        const q = query !== undefined ? query : document.getElementById("search-input").value;

        renderKuralList(document.getElementById("kural-list"), filtered, q);

        const countEl = document.getElementById("search-count");
        let countHtml = "";
        if (q.trim()) {
          if (filtered.length > 0) {
            countHtml = `Found <strong>${filtered.length}</strong> kural${filtered.length !== 1 ? "s" : ""} for "<strong>${q}</strong>"`;
          } else {
            countHtml = `No results for "<strong>${q}</strong>"`;
          }
        } else {
          countHtml = `Showing <strong>${filtered.length}</strong> kurals`;
        }

        if (q.trim() && filtered.length > 0) {
          const suggestion = this.findSuggestion(q);
          if (suggestion && suggestion !== q.toLowerCase()) {
            countHtml += ` &nbsp; | &nbsp; Did you mean: <button class="btn btn-sm" style="margin:0;padding:2px 8px;font-size:11px" onclick="SearchApp.setSearch('${this.escapeForAttr(suggestion)}');">${suggestion}</button>`;
          }
        }

        countEl.innerHTML = countHtml;
      },

      escapeForAttr(str) {
        return str.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/\n/g, "\\n").replace(/"/g, "&quot;");
      },

      getWordCache() {
        if (this.wordCache) return this.wordCache;
        const words = new Set();
        KURALS.forEach(k => {
          [k.kural.line1, k.kural.line2, k.couplet_en, k.meaning.en, k.meaning.ta, k.adhigaram.en, k.adhigaram.ta]
            .forEach(text => {
              text.toLowerCase().split(/\s+/).forEach(word => {
                if (word.length > 2) words.add(word.replace(/[^\w]/g, ''));
              });
            });
        });
        this.wordCache = Array.from(words).sort();
        return this.wordCache;
      },

      levenshteinDistance(a, b) {
        const m = a.length, n = b.length;
        const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
        for (let i = 0; i <= m; i++) dp[i][0] = i;
        for (let j = 0; j <= n; j++) dp[0][j] = j;
        for (let i = 1; i <= m; i++) {
          for (let j = 1; j <= n; j++) {
            dp[i][j] = Math.min(
              dp[i - 1][j] + 1,
              dp[i][j - 1] + 1,
              dp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
            );
          }
        }
        return dp[m][n];
      },

      findSuggestion(query) {
        const words = this.getWordCache();
        const q = query.toLowerCase().replace(/[^\w]/g, '');
        let best = null, bestDistance = 3;
        for (const word of words) {
          const dist = this.levenshteinDistance(q, word);
          if (dist < bestDistance) {
            bestDistance = dist;
            best = word;
          }
        }
        return best;
      },

      init() {
        const searchInput = document.getElementById("search-input");
        const searchBtn = document.getElementById("search-btn");

        if (searchInput) {
          searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") this.triggerSearch();
          });
        }

        if (searchBtn) {
          searchBtn.addEventListener("click", () => this.triggerSearch());
        }

        document.querySelectorAll(".sug-pill").forEach(btn => {
          btn.addEventListener("click", () => this.setSearch(btn.dataset.search));
        });

        document.querySelectorAll(".pal-filter").forEach(btn => {
          btn.addEventListener("click", () => this.applyPalFilter(btn, btn.dataset.pal));
        });

        const initQ = new URLSearchParams(window.location.search).get("q") || "";
        if (initQ) {
          searchInput.value = initQ;
          this.runSearch(initQ);
        }
      }
    };

    document.addEventListener("DOMContentLoaded", () => SearchApp.init());
  </script>

</body>
</html>
